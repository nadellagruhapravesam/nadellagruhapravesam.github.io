name: Deploy Gruhapravesam Invitation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create production environment file
        shell: bash
        env:
          REPOSITORY_VARIABLES: ${{ toJson(vars) }}
        run: |
          echo "$REPOSITORY_VARIABLES" |
            jq -r '
              to_entries[]
              | select(.key | startswith("VITE_"))
              | "\(.key)=\(.value)"
            ' > .env.production

          echo "Configured Vite production variables:"
          cut -d= -f1 .env.production

      - name: Build website
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v5
